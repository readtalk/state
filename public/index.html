<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Blackberry - State</title>
		<meta name="description" content="" />
		<meta name="author" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="stylesheet" href="css/normalize.css" />
		<link rel="stylesheet" href="css/skeleton.css" />
		<link rel="stylesheet" href="styles.css" />
		<link rel="icon" type="image/ico" href="favicon.ico" />
		
		<script>
			const urlParams = new URLSearchParams(window.location.search);
			const userId = urlParams.get('userId') || '';
			const email = urlParams.get('email') || '';
			
			if (userId) localStorage.setItem('readtalk_user_id', userId);
			if (email) localStorage.setItem('readtalk_email', email);
			
			// TAMPILIN DI HEADER SEBELAH KANAN (hanya jika ada parameter)
			if (userId || email) {
				document.addEventListener('DOMContentLoaded', function() {
					const headerRow = document.querySelector('.container .row');
					if (headerRow) {
						const userInfoDiv = document.createElement('div');
						userInfoDiv.className = 'two-thirds column';
						userInfoDiv.style.textAlign = 'right';
						userInfoDiv.style.marginTop = '2%';
						userInfoDiv.innerHTML = `
							<span style="background:#f0f0f0; padding:5px 10px; border-radius:5px; font-size:12px;">
								${userId.slice(0,8)}... | ${email.split('@')[0]}
							</span>
						`;
						
						const existingTwoThirds = headerRow.querySelector('.two-thirds.column:not(#root)');
						if (existingTwoThirds) {
							existingTwoThirds.replaceWith(userInfoDiv);
						} else {
							headerRow.appendChild(userInfoDiv);
						}
					}
				});
			}
			
			if ((userId || email) && window.location.search !== '') {
				window.history.replaceState({}, document.title, window.location.pathname);
			}
		</script>
		
		<script src="/dist/index.js" type="module"></script>
	</head>
	<body>
		<div class="container" style="width: 95%; height: 100%">
			<div class="row" style="height: 100%">
				<div class="one-third column" style="margin-top: 2%">
					<h4><b>Black</b>Berry</h4>
					<p>Online State</p>
				</div>
				<div class="two-thirds column" id="root"></div>
			</div>
		</div>
	</body>
</html>
