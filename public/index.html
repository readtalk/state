		<!-- Handle URL params: extract userId & email and save to localStorage -->
		<script>
			(function() {
				const urlParams = new URLSearchParams(window.location.search);
				const userId = urlParams.get('userId') || '';
				const email = urlParams.get('email') || '';
				
				if (userId) {
					localStorage.setItem('readtalk_user_id', userId);
				}
				if (email) {
					localStorage.setItem('readtalk_email', email);
				}
				
				// Clean URL by removing query params after saving
				if ((userId || email) && window.location.search !== '') {
					const cleanUrl = window.location.pathname;
					window.history.replaceState({}, document.title, cleanUrl);
				}
			})();
		</script>
		
		<script src="/dist/index.js" type="module"></script>
